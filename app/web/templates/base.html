<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="60">
    <title>{% block title %}VTP 스크리너{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">VTP 스크리너</div>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">대시보드</a>
            <a href="/signals" class="{% if request.path == '/signals' %}active{% endif %}">시그널</a>
            <a href="/trades" class="{% if request.path == '/trades' %}active{% endif %}">매매내역</a>
            <a href="/settings" class="{% if request.path == '/settings' %}active{% endif %}">설정</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>VTP 스크리너 - 거래량/가격 기반 스캘핑 시그널 시스템</p>
        <p style="font-size: 0.85em; color: #888; margin-top: 4px;">
            마지막 업데이트: {{ last_updated or '정보 없음' }}
            &nbsp;|&nbsp;
            스케줄: 08:50 유니버스 → 09:00 진입 → 장중 모니터링 → 15:35 스냅샷
        </p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
